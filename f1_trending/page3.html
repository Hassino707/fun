<!DOCTYPE html>
<html>
<head>
<title>Trending Now</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:Arial, sans-serif;
  color:#fff;
  text-align:center;
}

.container{
  padding:50px 20px;
}

.box{
  background:#1a1a1a;
  padding:25px;
  border-radius:12px;
  max-width:350px;
  margin:auto;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

h2{
  font-size:20px;
  margin-bottom:15px;
}

.small{
  font-size:13px;
  color:#aaa;
  margin-bottom:20px;
}

button{
  background: linear-gradient(45deg, #00ff99, #00cc66);
  color:#fff;
  border:none;
  padding:14px 25px;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
  <div class="box">

    <h2>This video is trending in your area 🔥</h2>

    <div class="small">Over 12,000 people are watching this right now</div>

    <button onclick="go()">WATCH NOW</button>

  </div>
</div>

<script>
function go(){
  let subid = new URLSearchParams(window.location.search).get("subid") || "default";
  window.location.href = "page4.html?subid=" + subid;
}
</script>

</body>
</html>
