<!DOCTYPE html>
<html>
<head>
<title>Checking...</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:Arial;
  color:#fff;
  text-align:center;
}

.container{
  padding:50px 20px;
}

.box{
  background:#1a1a1a;
  padding:25px;
  border-radius:12px;
  max-width:350px;
  margin:auto;
}

.small{
  color:#aaa;
  font-size:13px;
  margin-top:10px;
}

button{
  margin-top:20px;
  background: linear-gradient(45deg, #00ff99, #00cc66);
  color:#fff;
  border:none;
  padding:14px 25px;
  border-radius:8px;
  cursor:pointer;
}

/* ✅ THIS IS WHERE hover GOES */
button:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<h2>Checking your reward...</h2>
<div class="small">This may take a few seconds</div>

<button onclick="go()">CONTINUE</button>

</div>
</div>

<script>
function go(){
  let subid = new URLSearchParams(window.location.search).get("subid") || "default";
  window.location.href = "page3.html?subid=" + subid;
}
</script>

</body>
</html>
